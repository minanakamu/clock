<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Horloge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500&family=Marcellus&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #16140f;          /* single solid background */
    --ink: #f2ece1;
    --ink-soft: #9a9183;
    --ink-faint: #4f4940;
    --accent: #d6a740;      /* Braun-inspired warm accent */
    --line: rgba(242, 236, 225, 0.10);
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
 
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Outfit', sans-serif;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }
 
  /* clock perfectly centered in the viewport */
  .stage {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: rise 1.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
 
  .clockwrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
 
  /* AM / PM to the LEFT of the clock */
  .meridiem {
    position: absolute;
    right: 100%;
    margin-right: clamp(1.5rem, 4vw, 3.5rem);
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    text-align: right;
    transition: opacity 0.5s ease;
  }
  .meridiem span {
    font-size: clamp(0.85rem, 1.8vh, 1.2rem);
    font-weight: 300;
    letter-spacing: 0.35em;
    color: var(--ink-faint);
    transition: color 0.4s ease;
  }
  .meridiem span.on { color: var(--accent); }
  .meridiem.hidden { opacity: 0; }
 
  /* mode views */
  .view { display: none; }
  .view.active { display: block; animation: fadeSwap 0.6s ease both; }
  @keyframes fadeSwap {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }
 
  /* analog — clean Braun-inspired face */
  .analog {
    width: clamp(280px, 58vh, 520px);
    height: clamp(280px, 58vh, 520px);
    position: relative;
    border-radius: 50%;
    border: 1px solid var(--line);
  }
  .tick {
    position: absolute; top: 50%; left: 50%;
    width: 1px; height: 50%;
    transform-origin: top center;
    transform: translateX(-50%) rotate(var(--rot));
  }
  .tick::before {
    content: ''; position: absolute; top: 6px; left: 50%;
    transform: translateX(-50%);
    width: 1px; height: 7px; background: var(--ink-faint);
  }
  .tick.major::before {
    height: 16px; width: 3px; border-radius: 2px; background: var(--ink-soft);
  }
  .hand {
    position: absolute; bottom: 50%; left: 50%;
    transform-origin: bottom center; border-radius: 6px;
    transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .hand.hour   { width: 7px; height: 28%; background: var(--ink); margin-left: -3.5px; }
  .hand.minute { width: 4px; height: 38%; background: var(--ink); margin-left: -2px; }
  .hand.second { width: 2px; height: 42%; background: var(--accent); margin-left: -1px; transition: none; }
  .hand.second::after {                       /* counterweight tail, Braun detail */
    content: ''; position: absolute; bottom: -14%; left: 50%;
    transform: translateX(-50%);
    width: 6px; height: 16%; border-radius: 3px; background: var(--accent);
  }
  .cap {
    position: absolute; top: 50%; left: 50%;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); transform: translate(-50%, -50%);
  }
 
  /* digital — large, refined */
  .digital {
    font-weight: 200;
    font-size: clamp(5rem, 26vh, 15rem);
    line-height: 1;
    letter-spacing: -0.01em;
    display: flex;
    align-items: baseline;
    justify-content: center;
  }
  .colon { color: var(--accent); animation: blink 2s ease-in-out infinite; }
  @keyframes blink { 0%, 45%, 100% { opacity: 1; } 60%, 85% { opacity: 0.3; } }
  .seconds-line {
    text-align: center; font-weight: 300;
    font-size: clamp(1.1rem, 2.6vh, 1.6rem);
    color: var(--ink-soft); letter-spacing: 0.5em;
    margin-top: 0.8rem; text-indent: 0.5em;
  }
 
  /* weekday + date in bottom-left corner */
  .corner-date {
    position: fixed;
    left: clamp(1.8rem, 4vw, 4rem);
    bottom: clamp(1.8rem, 4vh, 3.5rem);
    z-index: 3;
    font-family: 'Marcellus', serif;
    text-align: left;
    line-height: 1.4;
  }
  .corner-date .weekday {
    display: block;
    font-size: clamp(1.1rem, 2.6vh, 1.5rem);
    color: var(--ink);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .corner-date .ymd {
    font-size: clamp(0.8rem, 1.8vh, 1rem);
    color: var(--ink-soft);
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
 
  /* control bar bottom-right */
  .controls {
    position: fixed;
    right: clamp(1.8rem, 4vw, 4rem);
    bottom: clamp(1.8rem, 4vh, 3.5rem);
    z-index: 3; display: flex; gap: 0.8rem; align-items: center;
  }
  .seg {
    display: flex; border: 1px solid var(--line);
    border-radius: 100px; overflow: hidden;
  }
  .seg button {
    background: transparent; border: none; color: var(--ink-faint);
    font-family: 'Outfit', sans-serif; font-size: 0.7rem;
    letter-spacing: 0.16em; padding: 0.55rem 1.25rem; cursor: pointer;
    transition: all 0.4s ease;
  }
  .seg button.active { color: var(--bg); background: var(--accent); }
  .seg button:not(.active):hover { color: var(--ink); }
  .seg.disabled { opacity: 0.3; pointer-events: none; }
</style>
</head>
<body>
  <main class="stage">
    <div class="clockwrap">
      <div class="meridiem hidden" id="meridiem">
        <span id="amLabel">AM</span>
        <span id="pmLabel">PM</span>
      </div>
 
      <div class="view active" id="viewAnalog">
        <div class="analog" id="analog">
          <div class="hand hour" id="hour"></div>
          <div class="hand minute" id="minute"></div>
          <div class="hand second" id="second"></div>
          <div class="cap"></div>
        </div>
      </div>
 
      <div class="view" id="viewDigital">
        <div class="digital" id="digital"></div>
        <div class="seconds-line" id="secondsLine"></div>
      </div>
    </div>
  </main>
 
  <div class="corner-date" id="cornerDate"></div>
 
  <div class="controls">
    <div class="seg">
      <button id="btnAnalog" class="active">ANALOG</button>
      <button id="btnDigital">DIGITAL</button>
    </div>
    <div class="seg disabled" id="formatSeg">
      <button id="btn24" class="active">24H</button>
      <button id="btn12">12H</button>
    </div>
  </div>
 
<script>
  const analog = document.getElementById('analog');
  for (let i = 0; i < 60; i++) {
    const t = document.createElement('div');
    t.className = 'tick' + (i % 5 === 0 ? ' major' : '');
    t.style.setProperty('--rot', (i * 6) + 'deg');
    analog.appendChild(t);
  }
 
  let use24 = true;
  let mode = 'analog';
 
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const pad = n => String(n).padStart(2, '0');
 
  function tick() {
    const now = new Date();
    const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds(), ms = now.getMilliseconds();
    const isPM = h >= 12;
 
    if (mode === 'analog') {
      document.getElementById('second').style.transform = `rotate(${(s + ms/1000)*6}deg)`;
      document.getElementById('minute').style.transform = `rotate(${(m + s/60)*6}deg)`;
      document.getElementById('hour').style.transform   = `rotate(${((h%12)+m/60)*30}deg)`;
    } else {
      let displayH = use24 ? pad(h) : (h % 12 || 12);
      document.getElementById('digital').innerHTML =
        `${displayH}<span class="colon">:</span>${pad(m)}`;
      document.getElementById('secondsLine').textContent = pad(s);
    }
 
    // AM/PM indicator (left of clock): shown for analog, and for digital 12H
    const showMeridiem = (mode === 'analog') || (mode === 'digital' && !use24);
    const mer = document.getElementById('meridiem');
    mer.classList.toggle('hidden', !showMeridiem);
    document.getElementById('amLabel').classList.toggle('on', !isPM);
    document.getElementById('pmLabel').classList.toggle('on', isPM);
 
    // date bottom-left
    document.getElementById('cornerDate').innerHTML =
      `<span class="weekday">${days[now.getDay()]}</span>` +
      `<span class="ymd">${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}</span>`;
 
    requestAnimationFrame(tick);
  }
  tick();
 
  // mode toggle
  const btnAnalog = document.getElementById('btnAnalog');
  const btnDigital = document.getElementById('btnDigital');
  const viewAnalog = document.getElementById('viewAnalog');
  const viewDigital = document.getElementById('viewDigital');
  const formatSeg = document.getElementById('formatSeg');
 
  function setMode(next) {
    mode = next;
    const isAnalog = next === 'analog';
    btnAnalog.classList.toggle('active', isAnalog);
    btnDigital.classList.toggle('active', !isAnalog);
    viewAnalog.classList.toggle('active', isAnalog);
    viewDigital.classList.toggle('active', !isAnalog);
    formatSeg.classList.toggle('disabled', isAnalog);
  }
  btnAnalog.onclick = () => setMode('analog');
  btnDigital.onclick = () => setMode('digital');
 
  const btn24 = document.getElementById('btn24'), btn12 = document.getElementById('btn12');
  btn24.onclick = () => { use24 = true;  btn24.classList.add('active'); btn12.classList.remove('active'); };
  btn12.onclick = () => { use24 = false; btn12.classList.add('active'); btn24.classList.remove('active'); };
</script>
</body>
</html>
